<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title id="pageTitle">TrendToker — Article</title>
<meta name="description" id="pageDesc" content="TikTok trend analysis">
<meta name="robots" content="index, follow">
<meta property="og:title" id="ogTitle" content="TrendToker">
<meta property="og:description" id="ogDesc" content="TikTok trend analysis">
<meta property="og:type" content="article">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Trend<span>Toker</span></a>
    <div class="nav-links"><a href="/" id="navHome">Home</a><a href="category.html?id=viral" id="navViral">Viral Top</a><a href="category.html?id=niche" id="navNiche">Trend Radar</a><a href="category.html?id=audio" id="navAudio">Viral Audio</a><a href="category.html?id=ecom" id="navEcom">E-Commerce</a><a href="about.html" id="navAbout">About</a></div>
    <div class="nav-right"><button class="lang-btn" id="langBtn" onclick="switchLang()">中文</button><div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div></div>
  </div>
</nav>

<main class="main"><div class="container"><div class="content-layout">

<div class="article-page" style="grid-column:1">
  <div class="article-hero" id="articleHero"></div>
  <div class="article-header">
    <div class="article-badge-row"><span class="cat-tag" id="articleCat"></span><span class="news-card__badge badge-hot" id="articleBadge"></span></div>
    <h1 class="article-title" id="articleTitle"></h1>
    <div class="article-meta"><span id="articleDate"></span><span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--text-light);margin:0 8px"></span><span id="articleStats"></span></div>
  </div>
  <div class="article-body" id="articleBody"></div>
  <div class="ad-slot inline">📢 Advertisement</div>
  <div class="related-section"><h2 style="font-size:20px;font-weight:700;color:var(--navy);margin-bottom:16px" id="relatedTitle">Related Articles</h2><div class="related-grid" id="relatedGrid"></div></div>
</div>

<aside class="sidebar">
  <div class="sidebar-widget"><h4 id="sideHot">🔥 Hot List</h4><ul class="widget-list" id="hotList"></ul></div>
  <div class="sidebar-widget"><h4 id="sideSub">📬 Stay Updated</h4><form class="sub-form" id="subscribeForm"><input type="email" id="subEmail" placeholder="Your email"><button type="submit" id="subBtn">Subscribe</button></form></div>
  <div class="ad-slot sidebar">📢 Ad Space</div>
</aside>

</div></div></main>

<footer class="footer"><div class="container"><div class="footer-bottom"><span id="ftCopy">&copy; 2026 TrendToker</span><span id="ftTag">Independent News Analysis</span></div></div></footer>

<script src="js/main.js"></script>
<script>
const L = localStorage.getItem('lang') || 'en';
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

// Nav translations
const navT = { navHome:['Home','首页'], navViral:['Viral Top','今日爆款'], navNiche:['Trend Radar','赛道风向'], navAudio:['Viral Audio','热门音乐'], navEcom:['E-Commerce','跨境电商'], navAbout:['About','关于'], sideHot:['🔥 7-Day Hot List','🔥 七日热度榜'], sideSub:['📬 Stay Updated','📬 订阅更新'], subBtn:['Subscribe','订阅'], subEmail:['Your email','输入邮箱'], ftCopy:['© 2026 TrendToker. All rights reserved.','© 2026 TrendToker. 版权所有.'], ftTag:['Independent News Analysis','独立新闻分析'], relatedTitle:['Related Articles','相关推荐'] };
function _(k){return (navT[k]||['',''])[L==='zh'?1:0]}
function s_(id,k){var e=document.getElementById(id);if(e)e.textContent=_(k)}
Object.keys(navT).forEach(k=>s_(k,k));
document.getElementById('langBtn').textContent = L==='zh'?'English':'中文';
document.getElementById('subEmail').placeholder = _('subEmail');

fetch('data/articles.json').then(r=>r.json()).then(articles => {
  const a = articles.find(x=>x.id===id);
  if(!a){document.getElementById('articleTitle').textContent='Not Found';return;}
  const content = a.content[L] || a.content.en;

  document.title = (L==='zh'?a.title_zh:a.title_en) + ' | TrendToker';
  document.getElementById('pageDesc').content = L==='zh'?a.summary_zh:a.summary_en;

  document.getElementById('articleHero').innerHTML = a.image ? `<img src="${a.image}" alt="" style="width:100%;max-height:420px;object-fit:cover;border-radius:16px">` : '';
  document.getElementById('articleCat').textContent = a.category.toUpperCase();
  document.getElementById('articleBadge').textContent = a.badge;
  document.getElementById('articleBadge').className = 'news-card__badge '+a.badgeClass;
  document.getElementById('articleTitle').textContent = L==='zh'?a.title_zh:a.title_en;
  document.getElementById('articleDate').textContent = (L==='zh'?'更新于 ':'')+a.date;
  const ss = a.stats ? Object.entries(a.stats).filter(([k])=>k!=='note').map(([,v])=>v).join(' · ') : '';
  document.getElementById('articleStats').textContent = ss;

  document.getElementById('articleBody').innerHTML = `
    <p>${content.what}</p>
    <div class="highlight-box"><p style="margin:0">${content.data}</p></div>
    <h2>${L==='zh'?'深度拆解':'Deep Analysis'}</h2>
    <p>${content.analysis}</p>
    <div class="highlight-box orange"><p style="margin:0"><strong>${L==='zh'?'💡 实操启示':'💡 Key Takeaways'}</strong><br>${content.takeaway}</p></div>
    <div class="disclaimer-box"><strong>${L==='zh'?'免责声明：':'Disclaimer:'}</strong> ${L==='zh'?'本文基于 TikTok Creator Center 公开数据编制，仅供趋势参考，不构成商业建议。':'Based on public TikTok Creator Center data. For trend analysis only, not business advice.'}</div>`;

  // Related
  const related = articles.filter(x=>x.id!==id&&x.category===a.category).slice(0,3);
  document.getElementById('relatedGrid').innerHTML = related.map(r=>`
    <a href="article.html?id=${r.id}" class="news-card" style="text-decoration:none;color:inherit">
      <div class="news-card__img"><img src="${r.image}" loading="lazy"><span class="news-card__badge ${r.badgeClass}">${r.badge}</span></div>
      <div class="news-card__body"><div class="news-card__cat">${r.category.toUpperCase()}</div><div class="news-card__title" style="font-size:14px">${L==='zh'?r.title_zh:r.title_en}</div><div class="news-card__footer"><span>${r.date}</span></div></div></a>`).join('');

  // Hot list
  ['viral-001','viral-002','viral-003','niche-001','ecom-001','niche-002','audio-001'].forEach((hid,i)=>{
    const ra=articles.find(x=>x.id===hid); if(!ra) return;
    const rc=i<3?['rank-1','rank-2','rank-3'][i]:'rank-other';
    document.getElementById('hotList').innerHTML += `<li><a href="article.html?id=${hid}"><span class="widget-rank ${rc}">${i+1}</span>${L==='zh'?ra.title_zh:ra.title_en}</a></li>`;
  });
});

function switchLang() {
  localStorage.setItem('lang', L==='en'?'zh':'en');
  window.location.reload();
}
</script>
</body></html>
