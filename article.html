</aside>

<script>
function toggleMenu(){var n=document.querySelector('.nav-links');n.style.display=n.style.display==='flex'?'none':'flex'}
var L=localStorage.getItem('lang')||null;if(!L)L='en';
function applyLang(lang){
  L=lang;localStorage.setItem('lang',lang);
  document.getElementById('langBtn').textContent=lang==='zh'?'English':'中文';
  var t={nChina:['China','中国区'],nUS:['US','美国区'],nEU:['EU','欧盟区'],nAbout:['About','关于'],aChartT:['Trend Growth Curve (30 Days)','趋势增长曲线（30天）'],aPanelT:['Trend Intelligence Dashboard','趋势情报面板'],aRelated:['Related Reports','相关报告'],aSideHot:['Hot This Week','本周热门'],aSideSub:['Stay Updated','订阅更新']};
  Object.keys(t).forEach(function(k){var e=document.getElementById(k);if(e)e.textContent=t[k][lang==='zh'?1:0]});
  // Re-render article content if already loaded
  if(window._article)renderArticle(window._article);
}
applyLang(L);
function swL(){applyLang(L==='en'?'zh':'en')}
const p=new URLSearchParams(location.search);
const reg=p.get('r')||'china',id=p.get('id');
const na={china:'China',us:'US',eu:'EU'};
const ac={china:'#FE2C55',us:'#161823',eu:'#003399'};
function _i(en,zh){return L==='zh'?zh:en}
fetch('data/'+reg+'.json').then(r=>r.json()).then(data=>{
  // Render
  function renderArticle(a){
    var c=a.content[L]||a.content.en;
    document.getElementById('aBadge').textContent=a.badge;
    document.getElementById('aBadge').className='rank-badge b-'+(a.badgeClass||'tag-hot').replace('tag-','');
    var ph=document.getElementById('aPhase');
    ph.className='ph-badge ph-'+(a.phase||'surging');
    ph.textContent=L=='zh'?a.phase_zh:a.phase;
    document.getElementById('aTitle').textContent=L=='zh'?a.title_zh:a.title_en;
    document.getElementById('aDate').textContent=(L=='zh'?'更新于 ':'')+a.date;
    document.getElementById('aStats').textContent=a.stats?Object.entries(a.stats).filter(function(p){return p[0]!=='note'}).map(function(p){return p[1]+' '+p[0]}).join(' · '):'';
    document.getElementById('pT').textContent=(L=='zh'?a.title_zh:a.title_en)+' | TrendToker';
    document.getElementById('pD').content=L=='zh'?a.summary_zh:a.summary_en;
    // Panel
    var ss='★'.repeat(a.difficulty||1)+'☆'.repeat(5-(a.difficulty||1));
    document.getElementById('aGrid').innerHTML=
      '<div class="dstat"><div class="val">'+(a.stats?Object.values(a.stats)[0]:'-')+'</div><div class="lbl">'+_i('views','播放量')+'</div></div>'+
      '<div class="dstat"><div class="val">'+(a.stats?Object.values(a.stats)[1]:'-')+'</div><div class="lbl">'+_i('growth','增长率')+'</div></div>'+
      '<div class="dstat"><div class="val">'+(a.cpm||'-')+'</div><div class="lbl">CPM / '+_i('value','价值')+'</div></div>'+
      '<div class="dstat"><div class="val">'+ss+'</div><div class="lbl">'+_i('difficulty','难度')+'</div></div>'+
      '<div class="dstat"><div class="val">'+(a.window||'-')+'</div><div class="lbl">'+_i('window','窗口')+'</div></div>'+
      '<div class="dstat"><div class="val" style="color:'+(a.phase==='surging'?'#DC2626':a.phase==='mature'?'#D97706':'#16A34A')+'">'+(L=='zh'?a.phase_zh:a.phase)+'</div><div class="lbl">'+_i('lifecycle','周期')+'</div></div>';
    // Body
    document.getElementById('aBody').innerHTML=
      '<p>'+c.what+'</p>'+
      '<div class="hl"><p style="margin:0">'+c.data+'</p></div>'+
      '<h2>'+_i('Deep Analysis','深度拆解')+'</h2><p>'+c.analysis+'</p>'+
      '<div class="hl green"><p style="margin:0"><strong>'+_i('Key Takeaways','实践启示')+'</strong><br>'+c.takeaway+'</p></div>'+
      '<div class="disc"><strong>'+_i('Disclaimer:','免责声明：')+'</strong>'+_i('Based on public data. For trend analysis only.','本文基于公开数据编制，仅供趋势参考。')+'</div>';
    // Actions
    if(a.actions){
      var ac=a.actions;
      var lb={en:{creator:'Creator Actions',brand:'Brand Actions',seller:'Seller Actions',avoid:'What to Avoid'},zh:{creator:'创作者行动清单',brand:'品牌行动清单',seller:'卖家行动清单',avoid:'避坑指南'}};
      var l=lb[L];
      document.getElementById('aAct').innerHTML=
        '<div class="act-col"><h4>'+l.creator+'</h4><ul>'+ac.creator.map(function(x){return '<li>'+x+'</li>'}).join('')+'</ul></div>'+
        '<div class="act-col"><h4>'+l.brand+'</h4><ul>'+ac.brand.map(function(x){return '<li>'+x+'</li>'}).join('')+'</ul></div>'+
        '<div class="act-col"><h4>'+l.seller+'</h4><ul>'+ac.seller.map(function(x){return '<li>'+x+'</li>'}).join('')+'</ul></div>'+
        '<div class="act-col av"><h4>'+l.avoid+'</h4><ul>'+ac.avoid.map(function(x){return '<li>'+x+'</li>'}).join('')+'</ul></div>';
    }
    // Related
    document.getElementById('aRelList').innerHTML=data.filter(function(x){return x.id!==id}).slice(0,4).map(function(x){return '<li><a href="article.html?r='+reg+'&id='+x.id+'">'+(L=='zh'?x.title_zh:x.title_en)+'</a></li>'}).join('');
    // Hotlist sidebar
    document.getElementById('aHotList').innerHTML=data.slice(0,5).map(function(x,i){return '<li><a href="article.html?r='+reg+'&id='+x.id+'"><span class="mr mr'+(i<3?i+1:'o')+'">'+(i+1)+'</span>'+(L=='zh'?x.title_zh:x.title_en)+'</a></li>'}).join('');
    window._article=a;
  }
  var a = data.find(function(x){return x.id===id;});
  if(!a){
    document.getElementById('aBody').innerHTML = '<p style="text-align:center;padding:60px 0;color:var(--text-light)">' + _i('Article not found.','文章未找到。') + '</p>';
    document.getElementById('aTitle').textContent = _i('Not Found','未找到');
    return;
  }
  renderArticle(a);
    const accent=ac[reg], d=a.trend, mx=Math.max(...d), mn=Math.min(...d);
    // Gradient plugin
    const gPlug={id:'gFill2',beforeDraw:function(chart){
      const ctx=chart.ctx, ca=chart.chartArea;if(!ca)return;
      const g=ctx.createLinearGradient(0,ca.top,0,ca.bottom);
      g.addColorStop(0,accent+'40');g.addColorStop(0.5,accent+'10');g.addColorStop(1,accent+'00');
      chart.data.datasets[0].backgroundColor=g;
    }};
    Chart.register(gPlug);
    new Chart(document.getElementById('tChart'),{
      type:'line',
      data:{
        labels:d.map(function(_,i){return 'D'+(i+1)}),
        datasets:[{
          data:d,
          borderColor:accent,
          borderWidth:3,
          pointRadius:d.map(function(v){return v===mx||v===mn?5:2}),
          pointBackgroundColor:accent,
          pointBorderColor:'#fff',
          pointBorderWidth:2,
          pointHoverRadius:7,
          pointHoverBackgroundColor:accent,
          fill:true,
          tension:0.4
        }]
      },
      options:{
        responsive:true,
        interaction:{intersect:false,mode:'index'},
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'rgba(22,24,35,0.9)',
            titleFont:{size:12,weight:'600'},
            bodyFont:{size:11},
            padding:12,
            cornerRadius:8,
            displayColors:false,
            callbacks:{
              label:function(ctx){return (L==='zh'?'热度 ':'Heat ')+ctx.parsed.y.toLocaleString()}
            }
          }
        },
        scales:{
          x:{
            grid:{display:false},
            ticks:{font:{size:10},color:'#aaa',maxTicksLimit:9}
          },
          y:{
            beginAtZero:true,
            grid:{color:'rgba(0,0,0,0.06)',drawBorder:false},
            ticks:{font:{size:10},color:'#aaa',maxTicksLimit:5,callback:function(v){return v>=1000?(v/1000).toFixed(1)+'k':v}},
            border:{display:false}
          }
        }
      }
    });
  }
  // Related
  document.getElementById('aRelList').innerHTML=data.filter(x=>x.id!==id).slice(0,4).map(x=>`<li><a href="article.html?r=${reg}&id=${x.id}">${L=='zh'?x.title_zh:x.title_en}</a></li>`).join('');
  // Hotlist sidebar
  document.getElementById('aHotList').innerHTML=data.slice(0,5).map((x,i)=>`<li><a href="article.html?r=${reg}&id=${x.id}"><span class="mr mr${i<3?i+1:'o'}">${i+1}</span>${L=='zh'?x.title_zh:x.title_en}</a></li>`).join('');
});
function swL(){var newL=L==='en'?'zh':'en';localStorage.setItem('lang',newL);location.reload()}
</script>
